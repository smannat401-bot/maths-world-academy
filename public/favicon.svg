<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A6E"/>
    </linearGradient>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bgGrad)"/>

  <!-- Gold border ring -->
  <rect x="2" y="2" width="60" height="60" rx="12" ry="12" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>

  <!-- Bold "M" letter -->
  <text
    x="32"
    y="42"
    font-family="Georgia, serif"
    font-size="36"
    font-weight="900"
    text-anchor="middle"
    fill="url(#mGrad)"
    letter-spacing="-1"
  >M</text>

  <!-- Small math symbol bottom right -->
  <text
    x="52"
    y="58"
    font-family="Arial, sans-serif"
    font-size="13"
    font-weight="bold"
    text-anchor="middle"
    fill="#F59E0B"
    opacity="0.85"
  >²</text>

  <!-- Small pi symbol top left -->
  <text
    x="12"
    y="18"
    font-family="Arial, sans-serif"
    font-size="11"
    font-weight="bold"
    text-anchor="middle"
    fill="#F59E0B"
    opacity="0.7"
  >π</text>
</svg>
